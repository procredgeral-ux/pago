[build]
builder = "DOCKERFILE"

[deploy]
# Usar npm start (modo normal, não standalone)
startCommand = "npm start"
# Rodar migrations do Prisma antes de cada deploy
preDeployCommand = "npx prisma migrate deploy"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
PORT = "3000"
HOSTNAME = "0.0.0.0"
