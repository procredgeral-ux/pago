<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad1)"/>

  <!-- Database layers (3 stacked databases) -->
  <g transform="translate(128, 80)">
    <!-- Top database -->
    <ellipse cx="0" cy="-20" rx="50" ry="12" fill="#ffffff" opacity="0.9"/>
    <rect x="-50" y="-20" width="100" height="24" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="0" cy="4" rx="50" ry="12" fill="#e0e7ff" opacity="0.9"/>

    <!-- Middle database -->
    <ellipse cx="0" cy="20" rx="50" ry="12" fill="#ffffff" opacity="0.8"/>
    <rect x="-50" y="20" width="100" height="24" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="0" cy="44" rx="50" ry="12" fill="#e0e7ff" opacity="0.8"/>

    <!-- Bottom database -->
    <ellipse cx="0" cy="60" rx="50" ry="12" fill="#ffffff" opacity="0.7"/>
    <rect x="-50" y="60" width="100" height="24" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="0" cy="84" rx="50" ry="12" fill="#e0e7ff" opacity="0.7"/>
  </g>

  <!-- Network nodes connecting to databases -->
  <circle cx="60" cy="128" r="8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="196" cy="128" r="8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="128" cy="190" r="8" fill="#fbbf24" opacity="0.9"/>

  <!-- Connection lines -->
  <line x1="68" y1="128" x2="100" y2="128" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>
  <line x1="156" y1="128" x2="188" y2="128" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>
  <line x1="128" y1="164" x2="128" y2="182" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>
</svg>
